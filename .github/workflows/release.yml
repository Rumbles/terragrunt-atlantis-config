name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  create-release:
    name: Create Release
    runs-on: "ubuntu-latest"
    permissions:
      contents: write # create the GitHub release

    steps:
      # Install golang. Caching is disabled here: this job publishes release
      # artifacts, so a poisoned cache could taint a published release.
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "^1.23"
          cache: false

      # Checkout code
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # build binaries for all supported environments
      - run: sudo apt update && sudo apt install -y make
      - run: make build-all

      # Create the binary checksums
      - name: Get the version
        id: get_version
        run: echo VERSION=${GITHUB_REF#refs/tags/v} >> $GITHUB_OUTPUT
      - name: Create checksums
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          readonly BUILD_DIR="build/${VERSION}"
          find "$BUILD_DIR" -type f -exec sha256sum {} + | awk -v build_dir="$BUILD_DIR" '{sub("^"build_dir"/", ""); print $1, $2}' > SHA256SUMS
          find "$BUILD_DIR" -type f -exec sha512sum {} + | awk -v build_dir="$BUILD_DIR" '{sub("^"build_dir"/", ""); print $1, $2}' > SHA512SUMS

      # Create the release
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: false
          files: |
            build/${{ steps.get_version.outputs.VERSION }}/*
            SHA256SUMS
            SHA512SUMS
